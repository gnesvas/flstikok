<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - مساحة التخزين السحابية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* الهيدر الوهمي لقوقل درايف */
        .header {
            width: 100%;
            background-color: #ffffff;
            padding: 15px 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .header img {
            width: 30px;
            margin-left: 10px;
        }

        .header span {
            font-size: 20px;
            color: #5f6368;
            font-weight: 500;
        }

        /* كرت الملف */
        .file-card {
            background-color: #ffffff;
            width: 90%;
            max-width: 400px;
            margin-top: 50px;
            border-radius: 12px;
            border: 1px solid #dadce0;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .file-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .file-name {
            font-size: 18px;
            color: #202124;
            font-weight: 700;
            margin-bottom: 8px;
            word-wrap: break-word;
        }

        .file-size {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 30px;
        }

        /* زر التحميل */
        .download-btn {
            background-color: #1a73e8;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 700;
            display: inline-block;
            width: 80%;
            transition: background-color 0.3s;
        }

        .download-btn:hover {
            background-color: #1557b0;
        }

        /* رسالة التحقق الأمني (التمهيد للقفل) */
        .security-note {
            margin-top: 25px;
            font-size: 12px;
            color: #5f6368;
            line-height: 1.6;
            background-color: #f1f3f4;
            padding: 12px;
            border-radius: 8px;
            text-align: right;
            border-right: 4px solid #34a853;
        }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-size: 24px; margin-left: 10px;">💾</span>
        <span>سحابة التخزين - Drive</span>
    </div>

    <div class="file-card">
        <div class="file-icon">📁</div>
        <div class="file-name">شرح_الاستراتيجية_كامل.zip</div>
        <div class="file-size">الحجم: 245 MB | تم الفحص بواسطة مكافح الفيروسات ✔️</div>
        
        <a href="حطي_رابط_القفل_هنا_مكان_هذا_النص" class="download-btn">تنزيل الملف الان</a>

        <div class="security-note">
            <strong>🔒 فحص أمني:</strong> نظراً للضغط العالي على خوادم التحميل، يرجى إكمال خطوة تحقق سريعة ومجانية لإثبات أنك لست "روبوت" (Captcha) ليتم بدء التحميل فوراً.
        </div>
    </div>

</body>
</html>
